<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Contact - Juste Un Instant</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      padding: 50px;
    }
    form {
      background: white;
      padding: 30px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
      color: #333;
    }
    label {
      display: block;
      margin-top: 15px;
    }
    input[type="text"],
    input[type="email"] {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    input[type="submit"] {
      margin-top: 20px;
      padding: 10px 20px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    input[type="submit"]:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>

  <form action="mailto:justeuninstant.photographie@gmail.com" method="post" enctype="text/plain">
    <h2>Contactez-nous</h2>
    
    <label for="nom">Nom :</label>
    <input type="text" id="nom" name="Nom" required>
    
    <label for="prenom">Prénom :</label>
    <input type="text" id="prenom" name="Prénom" required>
    
    <label for="email">Email :</label>
    <input type="email" id="email" name="Email" required>
    
    <input type="submit" value="Envoyer">
  </form>

</body>
</html>
