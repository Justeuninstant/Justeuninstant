
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Albums Clients</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
    }

    header {
      text-align: center;
      padding: 2rem 1rem;
      background-color: #fff;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    h1 {
      margin: 0;
      font-size: 2rem;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1rem;
      padding: 2rem;
    }

    .album {
      background-color: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      text-align: center;
      transition: transform 0.2s;
    }

    .album:hover {
      transform: translateY(-5px);
    }

    .album img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .album h2 {
      margin: 0;
      padding: 1rem;
      font-size: 1.2rem;
      background-color: #fafafa;
    }

    .album a {
      text-decoration: none;
      color: inherit;
    }
  </style>
</head>
<body>

  <header>
    <h1>Albums Clients</h1>
  </header>

  <main class="gallery">
    <div class="album">
      <a href="https://lien-vers-album1.com">
        <img src="https://via.placeholder.com/300x200" alt="Album 1">
        <h2>Famille Dupont</h2>
      </a>
    </div>

    <div class="album">
      <a href="https://lien-vers-album2.com">
        <img src="https://via.placeholder.com/300x200" alt="Album 2">
        <h2>Julie & Marc</h2>
      </a>
    </div>

    <div class="album">
      <a href="https://lien-vers-album3.com">
        <img src="https://via.placeholder.com/300x200" alt="Album 3">
        <h2>Baptême de Léa</h2>
      </a>
    </div>
  </main>

</body>
</html>
